name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64, single file)
        run: >
          dotnet publish src/KenticoLogViewer/KenticoLogViewer.csproj
          /p:PublishProfile=win-x64
          -c Release
          --output publish/win-x64

      - name: Zip artifact
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath KenticoLogViewer-${{ github.ref_name }}-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: KenticoLogViewer-${{ github.ref_name }}-win-x64.zip
